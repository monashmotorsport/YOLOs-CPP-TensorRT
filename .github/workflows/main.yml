name: CI/CD Pipeline

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]
  workflow_dispatch:
    inputs:
      run_gpu_tests:
        description: "Run GPU tests (requires self-hosted runner with NVIDIA GPU)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: read

env:
  CUDA_VERSION: "12-6"

jobs:
  # ==========================================================================
  # Build — Compilation check on ubuntu-latest (no GPU required)
  # ==========================================================================
  build-gpu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
          key: apt-cuda-minimal-${{ runner.os }}-${{ env.CUDA_VERSION }}
          restore-keys: |
            apt-cuda-minimal-${{ runner.os }}-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libopencv-dev \
            wget

      - name: Install CUDA and TensorRT (minimal — compile only)
        run: |
          # Auto-detect Ubuntu version for correct NVIDIA repo
          UBUNTU_VER=$(. /etc/os-release && echo "${VERSION_ID}" | tr -d '.')
          echo "Runner OS: Ubuntu ${UBUNTU_VER}"

          wget -q "https://developer.download.nvidia.com/compute/cuda/repos/ubuntu${UBUNTU_VER}/x86_64/cuda-keyring_1.1-1_all.deb"
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          rm cuda-keyring_1.1-1_all.deb
          sudo apt-get update

          # Install ONLY minimal packages for compilation (no nsight/profiler bloat)
          sudo apt-get install -y --no-install-recommends \
            cuda-nvcc-${CUDA_VERSION} \
            cuda-cudart-dev-${CUDA_VERSION} \
            libnvinfer-dev \
            libnvinfer-headers-dev

          # Make nvcc available on PATH
          CUDA_DIR="/usr/local/cuda-${CUDA_VERSION//-/.}"
          echo "${CUDA_DIR}/bin" >> "$GITHUB_PATH"
          echo "CUDA_PATH=${CUDA_DIR}" >> "$GITHUB_ENV"
          echo "--- Installed CUDA compiler ---"
          "${CUDA_DIR}/bin/nvcc" --version

      - name: Build project
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CUDA_ARCHITECTURES="75;80;86;89;90"
          make -j$(nproc)

      - name: Verify build artifacts
        run: |
          echo "=== Build artifacts ==="
          ls -la build/
          echo ""
          echo "=== Checking executables ==="
          file build/image_inference
          file build/video_inference
          file build/batch_image_inference
          file build/class_image_inference
          file build/camera_inference

  # ==========================================================================
  # Build Benchmark Tool
  # ==========================================================================
  build-benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
          key: apt-cuda-minimal-${{ runner.os }}-${{ env.CUDA_VERSION }}
          restore-keys: |
            apt-cuda-minimal-${{ runner.os }}-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libopencv-dev \
            wget

      - name: Install CUDA and TensorRT (minimal — compile only)
        run: |
          UBUNTU_VER=$(. /etc/os-release && echo "${VERSION_ID}" | tr -d '.')
          echo "Runner OS: Ubuntu ${UBUNTU_VER}"

          wget -q "https://developer.download.nvidia.com/compute/cuda/repos/ubuntu${UBUNTU_VER}/x86_64/cuda-keyring_1.1-1_all.deb"
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          rm cuda-keyring_1.1-1_all.deb
          sudo apt-get update

          sudo apt-get install -y --no-install-recommends \
            cuda-nvcc-${CUDA_VERSION} \
            cuda-cudart-dev-${CUDA_VERSION} \
            libnvinfer-dev \
            libnvinfer-headers-dev

          CUDA_DIR="/usr/local/cuda-${CUDA_VERSION//-/.}"
          echo "${CUDA_DIR}/bin" >> "$GITHUB_PATH"
          echo "CUDA_PATH=${CUDA_DIR}" >> "$GITHUB_ENV"
          "${CUDA_DIR}/bin/nvcc" --version

      - name: Build benchmark tool
        working-directory: benchmarks
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CUDA_ARCHITECTURES="75;80;86;89;90"
          make -j$(nproc)

      - name: Verify benchmark build
        run: |
          echo "=== Benchmark artifacts ==="
          ls -la benchmarks/build/
          file benchmarks/build/yolo_unified_benchmark

  # ==========================================================================
  # Code Quality Checks
  # ==========================================================================
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format

      - name: Check C++ code formatting
        run: |
          FORMAT_ISSUES=0
          while IFS= read -r file; do
            if ! clang-format --dry-run --Werror "$file" 2>/dev/null; then
              echo "::warning file=${file}::Format issues detected in ${file}"
              FORMAT_ISSUES=$((FORMAT_ISSUES + 1))
            fi
          done < <(find include/ src/ examples/ benchmarks/ \
                     -name "*.cpp" -o -name "*.hpp" -o -name "*.cu" | sort)

          if [ "$FORMAT_ISSUES" -gt 0 ]; then
            echo "::warning::Found formatting issues in ${FORMAT_ISSUES} file(s)"
          else
            echo "All files pass formatting checks"
          fi

      - name: Check for debug statements
        run: |
          if grep -rn "std::cout.*DEBUG\|printf.*debug\|#define DEBUG" \
               include/ src/ --include="*.cpp" --include="*.hpp" --include="*.cu"; then
            echo "::warning::Debug statements found in code"
          else
            echo "No debug statements found"
          fi

      - name: Report TODOs
        run: |
          echo "=== TODOs in codebase ==="
          grep -rn "TODO\|FIXME\|XXX\|HACK" \
            include/ src/ --include="*.cpp" --include="*.hpp" --include="*.cu" || \
            echo "No TODOs found"

      - name: Check header include guards
        run: |
          ISSUES=0
          while IFS= read -r file; do
            if ! head -5 "$file" | grep -qE "#pragma once|#ifndef"; then
              echo "::warning file=${file}::Missing include guard in ${file}"
              ISSUES=$((ISSUES + 1))
            fi
          done < <(find include/ -name "*.hpp" | sort)

          if [ "$ISSUES" -gt 0 ]; then
            echo "::warning::${ISSUES} header(s) missing include guards"
          else
            echo "All headers have include guards"
          fi

  # ==========================================================================
  # Docker Build — Verify Dockerfile.tensorrt builds successfully
  # ==========================================================================
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Dockerfile.tensorrt (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.tensorrt
          push: false
          tags: yolos-trt:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================================
  # GPU Tests — Self-hosted runner with NVIDIA GPU (manual trigger only)
  # ==========================================================================
  gpu-tests:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_gpu_tests == true }}
    runs-on: [self-hosted, linux, gpu]
    needs: [build-gpu]

    strategy:
      fail-fast: false
      matrix:
        task:
          - { id: "0", name: "detection" }
          - { id: "1", name: "classification" }
          - { id: "2", name: "segmentation" }
          - { id: "3", name: "pose" }
          - { id: "4", name: "obb" }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify GPU availability
        run: |
          echo "=== GPU Information ==="
          nvidia-smi
          echo ""
          echo "=== CUDA Version ==="
          nvcc --version || true

      - name: Build test suite (${{ matrix.task.name }})
        working-directory: tests
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DtestTask=${{ matrix.task.id }}
          make -j$(nproc)

      - name: Run ${{ matrix.task.name }} tests
        working-directory: tests/build
        run: |
          ctest --output-on-failure --timeout 300

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-test-results-${{ matrix.task.name }}
          path: tests/${{ matrix.task.name }}/results/
          retention-days: 14
